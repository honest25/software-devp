<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace Pro - Ultimate Edition</title>
    
    <!-- JSZip for Exporting Projects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- PrismJS for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-panel: #18181b;
            --bg-input: #27272a;
            --bg-hover: #3f3f46;
            --border-color: #3f3f46;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-neon: #0ea5e9;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --font-mono: 'Fira Code', 'Consolas', monospace;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --shadow-glow: 0 0 15px rgba(14, 165, 233, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans); background-color: var(--bg-dark); color: var(--text-main);
            height: 100vh; display: flex; overflow: hidden;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Icons & Buttons */
        .icon { width: 16px; height: 16px; fill: currentColor; }
        .icon-btn { cursor: pointer; opacity: 0.6; transition: 0.2s; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 4px; }
        .icon-btn:hover { opacity: 1; background: var(--bg-hover); }
        .icon-red:hover { color: var(--accent-red); background: rgba(239, 68, 68, 0.1); }
        .icon-green:hover { color: var(--accent-green); background: rgba(16, 185, 129, 0.1); }
        .icon-blue:hover { color: var(--accent-neon); background: rgba(14, 165, 233, 0.1); }

        .btn {
            background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
            display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }
        .btn-primary { background: var(--accent-neon); border-color: var(--accent-neon); color: #fff; }
        .btn-primary:hover { background: #0284c7; border-color: #0284c7; box-shadow: var(--shadow-glow); }
        .btn-run { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }
        .btn-run:hover { background: #059669; border-color: #059669; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .btn-danger { color: var(--accent-red); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05); }
        .btn-danger:hover { background: var(--accent-red); color: #fff; border-color: var(--accent-red); }

        /* Sidebar Structure */
        .sidebar {
            width: 300px; min-width: 220px; max-width: 500px; display: flex; flex-direction: column;
            background: var(--bg-panel); border-right: 1px solid var(--border-color); z-index: 10;
        }

        .resizer { width: 4px; cursor: ew-resize; transition: 0.2s; position: absolute; left: 300px; height: 100%; z-index: 20; background: transparent; }
        .resizer:hover, .resizer.dragging { background: var(--accent-neon); }

        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 14px; }
        
        /* Settings Form */
        .settings-area { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px; }
        .input-group label { display: block; font-size: 11px; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .input-group select, .input-group input { width: 100%; padding: 8px 10px; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; font-size: 13px; outline: none; transition: 0.2s; }
        .input-group select:focus, .input-group input:focus { border-color: var(--accent-neon); box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2); }
        
        .api-row { display: flex; gap: 8px; }
        .btn-save-key { flex-shrink: 0; padding: 0 12px; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .btn-save-key:hover { background: var(--bg-hover); }
        .btn-save-key.saved { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }

        /* File Explorer */
        .file-explorer { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .file-header { padding: 12px 16px; font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; font-weight: 600; background: rgba(0,0,0,0.2); }
        .file-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .file-item { padding: 8px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: var(--text-muted); border-left: 2px solid transparent; transition: 0.1s; }
        .file-item:hover { background: rgba(255,255,255,0.03); color: var(--text-main); }
        .file-item.active { background: rgba(14, 165, 233, 0.1); color: var(--accent-neon); border-left-color: var(--accent-neon); }
        .file-name-wrap { display: flex; align-items: center; gap: 8px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-actions { display: flex; gap: 2px; opacity: 0; transition: 0.2s; }
        .file-item:hover .file-actions { opacity: 1; }

        /* Main Area */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 400px; margin-left: 4px; background: var(--bg-dark); }
        
        /* Tabs */
        .workspace-header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border-color); height: 48px; background: var(--bg-panel); }
        .tabs { display: flex; height: 100%; gap: 4px; }
        .tab { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 0 16px; height: 100%; position: relative; display: flex; align-items: center; gap: 8px; transition: 0.2s; border-bottom: 2px solid transparent; font-weight: 500; }
        .tab:hover { color: var(--text-main); background: rgba(255,255,255,0.03); }
        .tab.active { color: var(--accent-neon); border-bottom-color: var(--accent-neon); }
        .header-actions { display: flex; gap: 8px; }

        /* Panels */
        .workspace-content { flex: 1; position: relative; overflow: hidden; }
        .view-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; overflow: auto; flex-direction: column; }
        .view-panel.active { display: flex; }

        /* Chat Panel */
        .chat-container { padding: 24px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; height: 100%; padding-bottom: 100px; }
        .chat-msg { max-width: 85%; padding: 14px 18px; border-radius: 8px; font-size: 14px; line-height: 1.6; word-wrap: break-word; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .chat-user { align-self: flex-end; background: var(--bg-input); border: 1px solid var(--border-color); border-bottom-right-radius: 2px; }
        .chat-ai { align-self: flex-start; background: rgba(14, 165, 233, 0.08); border: 1px solid rgba(14, 165, 233, 0.2); border-bottom-left-radius: 2px; }
        .chat-system { align-self: center; font-size: 12px; color: var(--text-muted); background: none; box-shadow: none; border: 1px dashed var(--border-color); padding: 6px 16px; border-radius: 20px; }
        .chat-error { border-color: var(--accent-red); color: #fca5a5; background: rgba(239, 68, 68, 0.1); }
        .code-block-indicator { background: #000; padding: 8px 12px; border-radius: 6px; margin: 8px 0; font-family: var(--font-mono); font-size: 12px; border: 1px solid #333; color: #10b981; display: inline-block; }

        /* Code Editor Overlay Setup */
        .editor-wrapper { position: relative; width: 100%; height: 100%; background: #1e1e1e; }
        .code-textarea, .code-output { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            font-family: var(--font-mono); font-size: 14px; line-height: 1.5; 
            padding: 24px; margin: 0; border: none; tab-size: 4; white-space: pre; 
            word-wrap: normal; overflow: auto; box-sizing: border-box;
        }
        .code-textarea { 
            color: transparent; background: transparent; caret-color: var(--accent-neon); 
            z-index: 2; outline: none; resize: none; 
        }
        .code-output { 
            z-index: 1; pointer-events: none; margin: 0 !important; background: transparent !important; color: #d4d4d4; 
        }

        /* Preview & Console */
        #preview-iframe { width: 100%; height: 100%; border: none; background: #ffffff; }
        .console-log { font-family: var(--font-mono); font-size: 13px; padding: 10px 16px; border-bottom: 1px solid var(--border-color); word-break: break-all; }
        .console-error { color: #fca5a5; background: rgba(239, 68, 68, 0.05); border-left: 4px solid var(--accent-red); }
        .console-info { color: var(--text-main); border-left: 4px solid var(--accent-neon); }
        .console-warn { color: #fde047; border-left: 4px solid #eab308; background: rgba(234, 179, 8, 0.05); }

        /* Bottom Input Dock */
        .input-dock { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 24px; background: linear-gradient(to top, var(--bg-dark) 70%, transparent); z-index: 5; }
        .prompt-box { position: relative; display: flex; gap: 12px; max-width: 900px; margin: 0 auto; background: var(--bg-panel); padding: 8px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .prompt-input { flex: 1; background: transparent; border: none; color: var(--text-main); padding: 12px 16px; font-size: 14px; resize: none; height: 48px; outline: none; font-family: inherit; line-height: 24px; }
        .prompt-input::placeholder { color: var(--text-muted); }
        
        .generate-btn { background: var(--accent-neon); border: none; width: 48px; height: 48px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; transition: 0.2s; }
        .generate-btn:hover { background: #0284c7; transform: scale(1.05); }
        .generate-btn:disabled { background: var(--bg-hover); color: var(--text-muted); cursor: not-allowed; transform: none; }

        .loader { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Toast Notifications */
        #toast-container { position: fixed; bottom: 90px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--bg-panel); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease forwards; }
        .toast.success { border-left: 4px solid var(--accent-green); }
        .toast.error { border-left: 4px solid var(--accent-red); }
        .toast.info { border-left: 4px solid var(--accent-neon); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }

        /* Settings Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 24px; border-radius: 12px; width: 500px; max-width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .modal h3 { margin-bottom: 16px; font-size: 16px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .modal p { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; }
        .modal textarea { width: 100%; height: 200px; background: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); padding: 12px; border-radius: 6px; resize: vertical; margin-bottom: 16px; font-family: var(--font-mono); font-size: 13px; line-height: 1.5; outline: none; }
        .modal textarea:focus { border-color: var(--accent-neon); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>AI Workspace Pro</span>
            <div class="icon-btn" onclick="openSystemModal()" title="System Prompt">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </div>
        </div>
        
        <div class="settings-area">
            <div class="input-group">
                <label>AI Provider</label>
                <select id="provider-select" onchange="handleProviderChange()">
                    <option value="openrouter">OpenRouter (Auto-Fetch)</option>
                    <option value="gemini">Google Gemini API</option>
                </select>
            </div>
            <div class="input-group">
                <label>Model <span id="model-loading" style="display:none; color:var(--accent-neon); font-weight:normal;">(Fetching...)</span></label>
                <select id="model-select"></select>
            </div>
            <div class="input-group">
                <label>API Key</label>
                <div class="api-row">
                    <input type="password" id="api-key" placeholder="Enter API Key here..." autocomplete="off">
                    <button id="save-key-btn" class="btn-save-key" onclick="saveApiKey()">Save</button>
                </div>
            </div>
        </div>
        
        <div class="file-explorer">
            <div class="file-header">
                <span>Files</span>
                <div style="display:flex; gap:8px;">
                    <div class="icon-btn" onclick="createNewFile()" title="New File">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </div>
                    <div class="icon-btn icon-red" onclick="clearWorkspace()" title="Reset Workspace">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M15 16h4v2h-4zm0-8h7v2h-7zm0 4h6v2h-6zM3 18c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2V8H3v10zM14 5h-3l-1-1H6L5 5H2v2h12z"/></svg>
                    </div>
                </div>
            </div>
            <div class="file-list" id="file-list">
                <!-- Files rendered here -->
            </div>
        </div>
    </aside>

    <div class="resizer" id="resizer"></div>

    <!-- Main Workspace -->
    <main class="main-content" id="main-content">
        <header class="workspace-header">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('chat')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg> Chat
                </button>
                <button class="tab" onclick="switchTab('code')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg> Editor
                </button>
                <button class="tab" onclick="switchTab('preview')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg> Preview
                </button>
                <button class="tab" onclick="switchTab('console')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg> Console
                </button>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="downloadZip()">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Export ZIP
                </button>
                <button class="btn btn-run" onclick="runPreview()">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Run Project
                </button>
            </div>
        </header>

        <div class="workspace-content">
            <!-- Chat -->
            <div id="panel-chat" class="view-panel active">
                <div class="chat-container" id="chat-container">
                    <!-- Chat renders here -->
                </div>
            </div>

            <!-- Code Editor -->
            <div id="panel-code" class="view-panel">
                <div class="editor-wrapper">
                    <textarea id="code-textarea" class="code-textarea" spellcheck="false" oninput="handleEditorInput()" onscroll="syncEditorScroll()" onkeydown="handleEditorKeyDown(event)"></textarea>
                    <pre class="code-output"><code id="code-highlight" class="language-javascript">/* No file selected */</code></pre>
                </div>
            </div>

            <!-- Live Preview -->
            <div id="panel-preview" class="view-panel">
                <iframe id="preview-iframe"></iframe>
            </div>

            <!-- Console -->
            <div id="panel-console" class="view-panel">
                <div id="console-logs" style="height:100%; overflow-y:auto; padding-bottom:100px;"></div>
            </div>
        </div>

        <div class="input-dock">
            <div class="prompt-box">
                <textarea id="prompt-input" class="prompt-input" placeholder="What do you want to build? (Press Enter to send)" onkeydown="handlePromptKey(event)"></textarea>
                <button id="generate-btn" class="generate-btn" onclick="submitPrompt()">
                    <svg class="icon" id="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    <div class="loader" id="loader-icon"></div>
                </button>
            </div>
        </div>
    </main>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- System Prompt Modal -->
    <div class="modal-overlay" id="system-modal">
        <div class="modal">
            <h3><svg class="icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3...z"/></svg> Advanced System Instructions</h3>
            <p>Modify how the AI behaves. Leave the core file formatting rules intact to ensure the workspace can parse the generated code.</p>
            <textarea id="system-prompt-input"></textarea>
            <div class="modal-actions">
                <button class="btn" onclick="document.getElementById('system-modal').style.display='none'">Cancel</button>
                <button class="btn btn-primary" onclick="saveSystemPrompt()">Save Instructions</button>
            </div>
        </div>
    </div>

    <script>
        /* =========================================================================
           CORE STATE & CONFIGURATION
           ========================================================================= */
        let state = {
            provider: 'openrouter',
            model: '',
            files: [],
            currentFile: null,
            chatHistory: [],
            systemPrompt: `You are an expert Senior Full-Stack Developer.
Write clean, modern, and highly functional code.

CRITICAL INSTRUCTION FOR FILE CREATION:
You MUST output files using exactly this syntax:
### FILE: filename.ext
\`\`\`language
// complete working code here
\`\`\`

Always provide the FULL code. Do not use placeholders like "rest of code here". Keep conversational text outside the file blocks minimal.`
        };

        const staticModels = {
            gemini: [
                { value: "gemini-1.5-pro-latest", label: "Gemini 1.5 Pro" },
                { value: "gemini-1.5-flash-latest", label: "Gemini 1.5 Flash" },
                { value: "gemini-1.0-pro", label: "Gemini 1.0 Pro" }
            ],
            openrouter: [] // Dynamic
        };

        let isGenerating = false;

        /* =========================================================================
           INITIALIZATION & LOCAL STORAGE
           ========================================================================= */
        async function init() {
            setupResizer();
            setupIframeConsole();
            loadState();
            
            // Dynamic OR Fetch
            await fetchOpenRouterModels();
            
            // Re-apply state after fetch
            document.getElementById('provider-select').value = state.provider;
            populateModels(state.provider);
            if(state.model) document.getElementById('model-select').value = state.model;
            
            // Initial UI Render
            renderFiles();
            renderChat();
            if(state.currentFile) openFile(state.currentFile);
            else if(state.files.length === 0) {
                appendChatUI('system', 'Workspace Initialized. Ready to build.');
                appendChatUI('ai', 'Hello! I am your AI architect. Describe what you want to build, and I will generate the files for you.');
            }
        }

        function saveState() {
            state.provider = document.getElementById('provider-select').value;
            state.model = document.getElementById('model-select').value;
            localStorage.setItem('ai_workspace_state', JSON.stringify(state));
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('ai_workspace_state');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.files = parsed.files || [];
                    state.currentFile = parsed.currentFile || null;
                    state.chatHistory = parsed.chatHistory || [];
                    state.provider = parsed.provider || 'openrouter';
                    state.model = parsed.model || '';
                    if(parsed.systemPrompt) state.systemPrompt = parsed.systemPrompt;
                }
                document.getElementById('system-prompt-input').value = state.systemPrompt;
                
                // Keys are saved separately for security semantics
                const savedKey = localStorage.getItem('ai_workspace_key_' + state.provider);
                if(savedKey) document.getElementById('api-key').value = savedKey;
                
            } catch (e) {
                console.error("Failed to load state", e);
            }
        }

        function clearWorkspace() {
            if(!confirm("Erase entire workspace (Files, Chat, State)? This cannot be undone.")) return;
            state.files = [];
            state.chatHistory = [];
            state.currentFile = null;
            document.getElementById('chat-container').innerHTML = '';
            document.getElementById('console-logs').innerHTML = '';
            document.getElementById('preview-iframe').src = 'about:blank';
            clearEditor();
            saveState();
            init(); // Re-init
            showToast('Workspace reset successful.', 'success');
        }

        /* =========================================================================
           UI & SETTINGS
           ========================================================================= */
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            // Icon based on type
            let icon = '';
            if(type==='success') icon = '<svg class="icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
            else if(type==='error') icon = '<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
            else icon = '<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>';

            toast.innerHTML = `${icon} <span>${msg}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function fetchOpenRouterModels() {
            document.getElementById('model-loading').style.display = 'inline';
            try {
                const res = await fetch('https://openrouter.ai/api/v1/models');
                const data = await res.json();
                let models = data.data.map(m => {
                    let isFree = m.pricing && m.pricing.prompt === "0" && m.pricing.completion === "0";
                    return { value: m.id, label: (isFree ? '🚀 [FREE] ' : '') + m.name, isFree };
                });
                models.sort((a, b) => (a.isFree === b.isFree) ? a.label.localeCompare(b.label) : (a.isFree ? -1 : 1));
                staticModels.openrouter = models;
            } catch(e) {
                showToast("Failed to fetch OpenRouter models. Using defaults.", "error");
                staticModels.openrouter = [
                    { value: "google/gemini-pro", label: "🚀 [FREE] Gemini Pro" },
                    { value: "meta-llama/llama-3-8b-instruct", label: "🚀 [FREE] Llama 3 8B" },
                    { value: "openai/gpt-4o", label: "GPT-4o (OpenAI)" },
                    { value: "anthropic/claude-3.5-sonnet", label: "Claude 3.5 Sonnet" }
                ];
            }
            document.getElementById('model-loading').style.display = 'none';
        }

        function populateModels(provider) {
            const select = document.getElementById('model-select');
            select.innerHTML = '';
            staticModels[provider].forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.value;
                opt.textContent = m.label;
                select.appendChild(opt);
            });
        }

        function handleProviderChange() {
            const provider = document.getElementById('provider-select').value;
            populateModels(provider);
            const savedKey = localStorage.getItem('ai_workspace_key_' + provider);
            document.getElementById('api-key').value = savedKey || '';
            saveState();
        }

        function saveApiKey() {
            const provider = document.getElementById('provider-select').value;
            const key = document.getElementById('api-key').value.trim();
            localStorage.setItem('ai_workspace_key_' + provider, key);
            
            const btn = document.getElementById('save-key-btn');
            btn.textContent = 'Saved';
            btn.classList.add('saved');
            showToast(`${provider} API Key saved securely to LocalStorage.`, 'success');
            
            setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('saved'); }, 2000);
        }

        function openSystemModal() { document.getElementById('system-modal').style.display = 'flex'; }
        function saveSystemPrompt() {
            state.systemPrompt = document.getElementById('system-prompt-input').value;
            saveState();
            document.getElementById('system-modal').style.display = 'none';
            showToast('System instructions updated.', 'success');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(`panel-${tabId}`).classList.add('active');
            
            if(tabId === 'code' && state.currentFile) document.getElementById('code-textarea').focus();
        }

        function setupResizer() {
            const resizer = document.getElementById('resizer');
            const sidebar = document.getElementById('sidebar');
            let isResizing = false;

            resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'ew-resize'; resizer.classList.add('dragging'); });
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                let newWidth = e.clientX;
                if(newWidth < 220) newWidth = 220;
                if(newWidth > 600) newWidth = 600;
                sidebar.style.width = newWidth + 'px';
                resizer.style.left = newWidth + 'px';
            });
            document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; resizer.classList.remove('dragging'); });
        }

        /* =========================================================================
           FILE EXPLORER & EDITOR
           ========================================================================= */
        function renderFiles() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            state.files.forEach(file => {
                const div = document.createElement('div');
                div.className = `file-item ${state.currentFile === file.name ? 'active' : ''}`;
                div.onclick = () => openFile(file.name);
                
                div.innerHTML = `
                    <div class="file-name-wrap" title="${file.name}">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <span>${file.name}</span>
                    </div>
                    <div class="file-actions">
                        <div class="icon-btn icon-blue" onclick="renameFile('${file.name}', event)" title="Rename">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </div>
                        <div class="icon-btn icon-green" onclick="downloadFile('${file.name}', event)" title="Download">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        </div>
                        <div class="icon-btn icon-red" onclick="deleteFile('${file.name}', event)" title="Delete">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function createNewFile() {
            const name = prompt("Enter file name (e.g., app.js):");
            if (!name) return;
            if (state.files.find(f => f.name === name)) return showToast("File already exists", "error");
            state.files.push({ name, content: "" });
            saveState();
            renderFiles();
            openFile(name);
        }

        function renameFile(oldName, event) {
            event.stopPropagation();
            const newName = prompt("Enter new name:", oldName);
            if(!newName || newName === oldName) return;
            if(state.files.find(f => f.name === newName)) return showToast("Name already exists", "error");
            
            const file = state.files.find(f => f.name === oldName);
            file.name = newName;
            if(state.currentFile === oldName) state.currentFile = newName;
            saveState();
            renderFiles();
            if(state.currentFile === newName) updateSyntaxHighlighting();
        }

        function deleteFile(name, event) {
            event.stopPropagation();
            if(!confirm(`Delete ${name}?`)) return;
            state.files = state.files.filter(f => f.name !== name);
            if(state.currentFile === name) {
                state.currentFile = state.files.length > 0 ? state.files[0].name : null;
                if(state.currentFile) openFile(state.currentFile);
                else clearEditor();
            }
            saveState();
            renderFiles();
        }

        function downloadFile(name, event) {
            event.stopPropagation();
            const file = state.files.find(f => f.name === name);
            if(!file) return;
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([file.content], { type: 'text/plain' }));
            a.download = file.name;
            a.click();
        }

        function openFile(name) {
            state.currentFile = name;
            saveState();
            renderFiles();
            
            const file = state.files.find(f => f.name === name);
            if (!file) return;

            const textarea = document.getElementById('code-textarea');
            textarea.value = file.content;
            textarea.disabled = false;
            updateSyntaxHighlighting();
            
            // Switch tab automatically
            document.querySelectorAll('.tab')[1].click(); 
        }

        function clearEditor() {
            document.getElementById('code-textarea').value = "";
            document.getElementById('code-textarea').disabled = true;
            document.getElementById('code-highlight').textContent = "/* Workspace empty. Create a file or ask AI. */";
            document.getElementById('code-highlight').className = "";
        }

        function handleEditorInput() {
            if(!state.currentFile) return;
            const content = document.getElementById('code-textarea').value;
            const file = state.files.find(f => f.name === state.currentFile);
            if(file) file.content = content;
            updateSyntaxHighlighting();
            saveState();
        }

        function handleEditorKeyDown(e) {
            const ta = e.target;
            const val = ta.value;
            const start = ta.selectionStart;
            const end = ta.selectionEnd;

            // Tab support
            if (e.key === 'Tab') {
                e.preventDefault();
                ta.value = val.substring(0, start) + "    " + val.substring(end);
                ta.selectionStart = ta.selectionEnd = start + 4;
                handleEditorInput();
            }
            // Auto close brackets
            const pairs = { '(': ')', '{': '}', '[': ']', '"': '"', "'": "'" };
            if (pairs[e.key]) {
                e.preventDefault();
                ta.value = val.substring(0, start) + e.key + pairs[e.key] + val.substring(end);
                ta.selectionStart = ta.selectionEnd = start + 1;
                handleEditorInput();
            }
        }

        function syncEditorScroll() {
            const textarea = document.getElementById('code-textarea');
            const pre = document.querySelector('.code-output');
            pre.scrollTop = textarea.scrollTop;
            pre.scrollLeft = textarea.scrollLeft;
        }

        function updateSyntaxHighlighting() {
            if(!state.currentFile) return;
            const content = document.getElementById('code-textarea').value;
            const hl = document.getElementById('code-highlight');
            hl.textContent = content;
            
            const ext = state.currentFile.split('.').pop().toLowerCase();
            hl.className = '';
            const map = { js: 'javascript', html: 'markup', css: 'css', json: 'json', ts: 'typescript', sql: 'sql' };
            hl.classList.add(`language-${map[ext] || 'markup'}`);
            
            Prism.highlightElement(hl);
        }

        /* =========================================================================
           LIVE PREVIEW & CONSOLE
           ========================================================================= */
        function setupIframeConsole() {
            window.addEventListener("message", (e) => {
                if(e.data && e.data.type === 'console') {
                    const logs = document.getElementById('console-logs');
                    const div = document.createElement('div');
                    div.className = `console-log console-${e.data.level}`;
                    div.textContent = `> ${e.data.args.join(" ")}`;
                    logs.appendChild(div);
                    logs.scrollTop = logs.scrollHeight;
                }
            }, false);
        }

        function runPreview() {
            document.getElementById('console-logs').innerHTML = ''; 
            document.querySelectorAll('.tab')[2].click(); // Switch to preview
            saveState(); // Ensure latest is saved
            
            const iframe = document.getElementById('preview-iframe');
            
            let htmlFile = state.files.find(f => f.name.toLowerCase() === 'index.html' || f.name.endsWith('.html'))?.content;
            if(!htmlFile) {
                htmlFile = `<body style="font-family:sans-serif; text-align:center; padding:10vh 20px; background:#18181b; color:#fff;">
                    <h2 style="color:#0ea5e9;">No HTML File Found</h2>
                    <p style="color:#a1a1aa;">Create an index.html file or ask the AI to generate a web app.</p>
                </body>`;
            }

            // Inject CSS and JS files automatically into HTML
            const cssFiles = state.files.filter(f => f.name.endsWith('.css'));
            const jsFiles = state.files.filter(f => f.name.endsWith('.js') && !f.name.includes('server') && !f.name.includes('config'));

            let injectCSS = cssFiles.map(f => `<style>\n/* ${f.name} */\n${f.content}\n</style>`).join('\n');
            let injectJS = jsFiles.map(f => `<script>\n/* ${f.name} */\n${f.content}\n<\/script>`).join('\n');

            const interceptor = `<script>
                (function(){
                    const c = console;
                    const p = window.parent;
                    function s(l, a) { p.postMessage({type:'console', level:l, args:Array.from(a).map(String)}, '*'); }
                    c.log = function() { s('info', arguments); };
                    c.error = function() { s('error', arguments); };
                    c.warn = function() { s('warn', arguments); };
                    window.onerror = function(m, u, l) { s('error', [\`\${m} (Line \${l})\`]); };
                })();
            <\/script>`;

            let finalHTML = htmlFile;
            if (finalHTML.includes('</head>')) finalHTML = finalHTML.replace('</head>', `${interceptor}\n${injectCSS}\n</head>`);
            else finalHTML = `${interceptor}\n${injectCSS}\n${finalHTML}`;

            if (finalHTML.includes('</body>')) finalHTML = finalHTML.replace('</body>', `${injectJS}\n</body>`);
            else finalHTML = `${finalHTML}\n${injectJS}`;

            iframe.src = URL.createObjectURL(new Blob([finalHTML], { type: 'text/html' }));
            showToast('Preview updated and running.', 'success');
        }

        async function downloadZip() {
            if (state.files.length === 0) return showToast("No files to export.", "error");
            showToast("Packaging ZIP...");
            const zip = new JSZip();
            state.files.forEach(f => zip.file(f.name, f.content));
            const blob = await zip.generateAsync({ type: "blob" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "ai-workspace-project.zip";
            a.click();
            showToast("Project downloaded.", "success");
        }

        /* =========================================================================
           AI CHAT & GENERATION
           ========================================================================= */
        function handlePromptKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitPrompt();
            }
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '<div class="chat-system">Workspace Initialized. Previous session restored.</div>';
            state.chatHistory.forEach(msg => appendChatUI(msg.role, msg.content));
        }

        function appendChatUI(role, text, isError = false) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `chat-msg chat-${role === 'user' ? 'user' : role === 'system' ? 'system' : 'ai'}${isError ? ' chat-error' : ''}`;
            
            // Format Code blocks nicely in chat
            let formatted = text.replace(/```[a-z]*\n([\s\S]*?)```/g, "<div class='code-block-indicator'>&lt;/&gt; Code Generated</div>");
            formatted = formatted.replace(/\n/g, "<br>");
            div.innerHTML = formatted;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function submitPrompt() {
            const input = document.getElementById('prompt-input');
            const userText = input.value.trim();
            saveState(); // Update dropdowns to state

            if (!userText) return;
            const apiKey = document.getElementById('api-key').value.trim();
            if (!apiKey) {
                showToast("Please enter an API Key in the Settings panel first.", "error");
                document.getElementById('api-key').focus();
                return;
            }

            input.value = '';
            isGenerating = true;
            document.getElementById('send-icon').style.display = 'none';
            document.getElementById('loader-icon').style.display = 'block';
            document.getElementById('generate-btn').disabled = true;

            appendChatUI('user', userText);
            document.querySelectorAll('.tab')[0].click(); // Go to chat

            // Construct Context
            let context = state.files.length > 0 
                ? "Current workspace files:\n" + state.files.map(f => `### FILE: ${f.name}\n\`\`\`\n${f.content}\n\`\`\``).join('\n\n')
                : "Workspace is currently empty.";

            const finalPrompt = `${context}\n\nUSER REQUEST: ${userText}`;

            try {
                let aiResponse = "";
                if(state.provider === 'openrouter') {
                    aiResponse = await generateOpenRouter(apiKey, state.model, finalPrompt);
                } else {
                    aiResponse = await generateGemini(apiKey, state.model, finalPrompt);
                }
                
                state.chatHistory.push({ role: "user", content: userText });
                state.chatHistory.push({ role: "assistant", content: aiResponse });
                
                appendChatUI('ai', aiResponse);
                parseAIResponseAndSave(aiResponse);
                
            } catch (err) {
                console.error(err);
                appendChatUI('ai', `Error: ${err.message}`, true);
            } finally {
                isGenerating = false;
                document.getElementById('send-icon').style.display = 'block';
                document.getElementById('loader-icon').style.display = 'none';
                document.getElementById('generate-btn').disabled = false;
                saveState();
            }
        }

        // --- Robust Markdown Parser ---
        function parseAIResponseAndSave(text) {
            // Highly robust regex: looks for "### FILE: name" followed by ANY markdown code block
            const regex = /### FILE:\s*([^\n]+)\n\s*```[a-z]*\n([\s\S]*?)```/gi;
            let match;
            let updatedCount = 0;

            while ((match = regex.exec(text)) !== null) {
                const name = match[1].trim();
                const content = match[2].trim();
                
                if (name && content) {
                    const existing = state.files.find(f => f.name === name);
                    if (existing) existing.content = content;
                    else state.files.push({ name, content });
                    updatedCount++;
                    state.currentFile = name; // set last modified as current
                }
            }

            if (updatedCount > 0) {
                showToast(`Generated/Updated ${updatedCount} file(s).`, 'success');
                renderFiles();
                openFile(state.currentFile);
            }
        }

        // --- API Calls ---
        async function generateOpenRouter(apiKey, model, userPrompt) {
            let messages = [{ role: "system", content: state.systemPrompt }];
            state.chatHistory.forEach(m => messages.push(m));
            messages.push({ role: "user", content: userPrompt });

            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: model, messages: messages })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
            return data.choices[0].message.content;
        }

        // --- Advanced Gemini 400 Error Fix ---
        function normalizeGeminiHistory(chatHistory, newPrompt) {
            let safe = [];
            let lastRole = null;
            
            // Reconstruct history to ensure strict user->model alternation
            for (let m of chatHistory) {
                let gRole = m.role === 'assistant' ? 'model' : 'user';
                if (gRole === lastRole) {
                    safe[safe.length - 1].parts[0].text += "\n\n" + m.content;
                } else {
                    safe.push({ role: gRole, parts: [{ text: m.content }] });
                    lastRole = gRole;
                }
            }
            
            // Append the new prompt. Must be 'user'.
            if (lastRole === 'user') {
                safe[safe.length - 1].parts[0].text += "\n\n" + newPrompt;
            } else {
                safe.push({ role: 'user', parts: [{ text: newPrompt }] });
            }
            
            return safe;
        }

        async function generateGemini(apiKey, model, userPrompt) {
            const contents = normalizeGeminiHistory(state.chatHistory, userPrompt);
            const payload = { contents: contents };
            if (state.systemPrompt) payload.system_instruction = { parts: [{ text: state.systemPrompt }] };

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
            return data.candidates[0].content.parts[0].text;
        }

        // Start
        window.onload = init;
    </script>
